# XcodeGen spec — the single source of truth for the Xcode project.
# Regenerate the project after changing this file or adding/removing source
# folders:
#
#   brew install xcodegen      # one-time
#   xcodegen generate          # writes Shoebox.xcodeproj
#   open Shoebox.xcodeproj
#
# Source files are globbed from the folders below, so adding a new .swift file
# under Shoebox/ needs no project edit — just re-run xcodegen (or use Xcode's
# synchronized groups if you open the generated project directly).

name: Shoebox

options:
  bundleIdPrefix: com.vivtechnologies
  deploymentTarget:
    iOS: "26.0"
  developmentLanguage: en
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: "" # set your Apple Developer team id, or configure in Xcode

targets:
  Shoebox:
    type: application
    platform: iOS
    sources:
      - path: Shoebox
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vivtechnologies.shoebox
        INFOPLIST_FILE: Shoebox/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Shoebox/Resources/Shoebox.entitlements
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: "1,2" # iPhone + iPad
        ENABLE_PREVIEWS: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor

  ShoeboxTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: ShoeboxTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vivtechnologies.shoebox.tests
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: Shoebox

schemes:
  Shoebox:
    build:
      targets:
        Shoebox: all
        ShoeboxTests: [test]
    test:
      targets:
        - ShoeboxTests
